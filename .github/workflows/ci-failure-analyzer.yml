name: CI Failure Analyzer

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-analyzer.txt

      - name: Analyze CI failure
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "## CI Failure Analysis — Run ${{ github.event.workflow_run.id }}" >> "$GITHUB_STEP_SUMMARY"
          python scripts/analyze_ci_failure.py \
            --run-id "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --summarize >> "$GITHUB_STEP_SUMMARY"
